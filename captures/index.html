<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Overview Captures — What the Composition Layer Shows | Lee Sharks</title>
<meta name="description" content="Documented captures of Google AI Overview and AI Mode results for Crimson Hexagonal Archive entities. Each capture transcribed and annotated.">
<meta name="author" content="Lee Sharks">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--card:#14141e;--text:#b8b4ae;--dim:#555;--accent:#c84b2e;--teal:#00c9a7;--mono:'Courier New',monospace;--serif:Georgia,serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--serif);line-height:1.65}
.wrap{max-width:800px;margin:0 auto;padding:1.5em}
h1{font-size:1.6em;color:#fff;margin-bottom:0.2em}
h2{font-family:var(--mono);font-size:0.78em;color:var(--accent);text-transform:uppercase;letter-spacing:2px;margin-top:2.5em;margin-bottom:0.8em;border-bottom:1px solid #1a1a22;padding-bottom:0.4em}
.subtitle{color:var(--dim);font-size:0.88em;margin-bottom:1.5em;font-style:italic}
a{color:var(--teal);text-decoration:none}a:hover{text-decoration:underline}
.nav{font-family:var(--mono);font-size:0.78em;margin-bottom:1.5em}.nav a{color:var(--dim);margin-right:0.8em}
.cat-nav{font-family:var(--mono);font-size:0.72em;margin:1em 0;padding:0.6em 0;border-top:1px solid #1a1a22;border-bottom:1px solid #1a1a22;display:flex;flex-wrap:wrap;gap:0.4em}
.cat-nav a{color:var(--dim);white-space:nowrap;padding:0.15em 0.4em;border:1px solid transparent;border-radius:2px}
.cat-nav a:hover,.cat-nav a.active{color:var(--teal);border-color:#1a1a22}
.stats{font-family:var(--mono);font-size:0.78em;color:var(--dim);margin-bottom:1em}
.stats span{color:var(--teal);font-size:1.1em}
.search-box{width:100%;background:#111118;color:var(--text);border:1px solid #1a1a22;padding:0.5em 0.8em;font-family:var(--mono);font-size:0.82em;margin-bottom:1em;border-radius:3px}
.entry{border-bottom:1px solid #1a1a22;padding:1em 0}
.entry-header{display:flex;align-items:flex-start;gap:1em;cursor:pointer}
.entry-thumb{width:80px;height:140px;object-fit:cover;object-position:top;border:1px solid #222;border-radius:3px;flex-shrink:0;background:#0e0e16}
.no-thumb{width:80px;height:140px;flex-shrink:0;background:#0e0e16;border:1px solid #1a1a22;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:0.6em;color:var(--dim)}
.entry-text{flex:1;min-width:0}
.entry-query{font-family:var(--mono);font-size:0.9em;color:var(--teal);margin-bottom:0.15em;word-break:break-word}
.entry-meta{font-family:var(--mono);font-size:0.7em;color:var(--dim);margin-bottom:0.4em}
.entry-desc{font-size:0.85em;color:var(--text);line-height:1.6}
.entry-desc.collapsed{max-height:4.8em;overflow:hidden;position:relative}
.entry-desc.collapsed::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2em;background:linear-gradient(transparent,var(--bg))}
.toggle-btn{font-family:var(--mono);font-size:0.7em;color:var(--accent);cursor:pointer;margin-top:0.3em;background:none;border:none}
.broad{color:#4a9;font-size:0.65em;font-family:var(--mono);letter-spacing:1px}
.exact{color:var(--dim);font-size:0.65em;font-family:var(--mono);letter-spacing:1px}
.gallery{display:flex;gap:6px;flex-wrap:wrap;margin-top:0.6em}
.gallery img{max-width:180px;max-height:280px;border:1px solid #222;border-radius:3px;cursor:pointer;opacity:0.85;transition:opacity 0.2s}
.gallery img:hover{opacity:1;border-color:var(--teal)}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:100;justify-content:center;align-items:center;cursor:pointer}
.modal.active{display:flex}
.modal img{max-width:95vw;max-height:95vh}
.footer{margin-top:3em;padding-top:1em;border-top:1px solid #1a1a22;font-family:var(--mono);font-size:0.7em;color:var(--dim)}
</style>
</head>
<body>
<div class="wrap">
<div class="nav">
  <a href="/">← godkinggoogle</a>
  <a href="/captures/">Captures</a>
  <a href="/papers/">Papers</a>
  <a href="/terms/">Terms</a>
  <a href="https://machinemediation.org">MMRS</a>
</div>

<h1>AI Overview Captures</h1>
<div class="subtitle">What the Composition Layer Shows — Live from <a href="https://www.machinemediation.org/data/registry.json">registry.json</a></div>

<div class="stats" id="stats">Loading...</div>

<input type="text" class="search-box" id="search" placeholder="Search queries or descriptions...">

<div class="cat-nav" id="catNav"></div>

<div id="entries"></div>

<div class="footer">
  Lee Sharks · <a href="https://orcid.org/0009-0000-1599-0703">ORCID 0009-0000-1599-0703</a> · Crimson Hexagonal Archive<br>
  Data: <a href="https://www.machinemediation.org/data/registry.json">registry.json</a> · DOI: <a href="https://doi.org/10.5281/zenodo.20707509">10.5281/zenodo.20707509</a><br>
  <span style="color:var(--accent)">∮ = 1</span>
</div>
</div>

<div class="modal" id="modal" onclick="this.classList.remove('active')"><img id="modalImg"></div>

<script>
const IMG_BASE = '/captures/';
const DATA_URL = 'https://www.machinemediation.org/data/registry.json';
let D, activeCat = '';

function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

function splitDesc(d) {
  const words = (d||'').split(/\s+/);
  if (words.length <= 40) return { short: d, full: null };
  let breakIdx = -1, wc = 0;
  for (let i = 0; i < d.length; i++) {
    if (d[i] === ' ') wc++;
    if (wc >= 20 && d[i] === '.' && i+1 < d.length && d[i+1] === ' ') { breakIdx = i+1; break; }
  }
  if (breakIdx === -1) breakIdx = d.indexOf(' ', Math.floor(d.length * 0.4));
  return { short: d.substring(0, breakIdx), full: d };
}

function showModal(src) {
  document.getElementById('modalImg').src = src;
  document.getElementById('modal').classList.add('active');
}

function getImgSrc(img) { return typeof img === 'string' ? img : (img.src || ''); }

function renderEntries() {
  const q = document.getElementById('search').value.toLowerCase();
  let entries = D.entries.filter(e => {
    if (activeCat && e.s !== activeCat) return false;
    if (q && !e.q.toLowerCase().includes(q) && !(e.d||'').toLowerCase().includes(q)) return false;
    return true;
  });

  const el = document.getElementById('entries');
  el.innerHTML = entries.map((e, i) => {
    const imgs = (e.imgs || []).filter(img => getImgSrc(img));
    const firstSrc = imgs.length > 0 ? getImgSrc(imgs[0]) : '';
    const { short, full } = splitDesc(e.d || '');
    const hasMore = full && full.length > short.length;
    const mt = e.mt || '';
    const mtClass = mt.includes('EXACT') ? 'exact' : mt.includes('BROAD') ? 'broad' : mt.includes('ADOPT') ? 'broad' : 'exact';

    return `<div class="entry">
      <div class="entry-header" onclick="this.parentElement.querySelector('.entry-body').classList.toggle('hidden')">
        ${firstSrc ? `<img class="entry-thumb" src="${IMG_BASE}${firstSrc}" alt="${esc(e.q)}" loading="lazy" onerror="this.style.display='none'">` : `<div class="no-thumb">no img</div>`}
        <div class="entry-text">
          <div class="entry-query">${esc(e.q)}</div>
          <div class="entry-meta">${e.date||''} · ${e.sf||''} ${mt ? `<span class="${mtClass}">${mt}</span>` : ''}</div>
          <div class="entry-desc collapsed">${esc(short)}</div>
        </div>
      </div>
      <div class="entry-body hidden" style="padding-left:96px;margin-top:0.5em">
        ${hasMore ? `<div class="entry-desc" style="font-size:0.85em">${esc(full)}</div>` : ''}
        ${imgs.length > 0 ? `<div class="gallery">${imgs.map(img => {
          const s = getImgSrc(img);
          return `<img src="${IMG_BASE}${s}" alt="${typeof img === 'string' ? s : (img.label||s)}" loading="lazy" onclick="event.stopPropagation();showModal(this.src)" onerror="this.style.display='none'">`;
        }).join('')}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function init() {
  try {
    const r = await fetch(DATA_URL);
    D = await r.json();
    
    document.getElementById('stats').innerHTML = `<span>${D.total_captures}</span> captures · v${D.version} · ${D.date||''}`;
    
    // Category nav
    const cats = [...new Set(D.entries.map(e => e.s))].sort();
    const nav = document.getElementById('catNav');
    nav.innerHTML = `<a href="#" class="active" onclick="activeCat='';renderEntries();document.querySelectorAll('.cat-nav a').forEach(a=>a.classList.remove('active'));this.classList.add('active');return false;">All</a>` +
      cats.map(c => `<a href="#" onclick="activeCat='${c}';renderEntries();document.querySelectorAll('.cat-nav a').forEach(a=>a.classList.remove('active'));this.classList.add('active');return false;">${c}</a>`).join('');
    
    renderEntries();
    document.getElementById('search').addEventListener('input', renderEntries);
  } catch(e) {
    document.getElementById('stats').innerHTML = `Error: ${e.message}`;
  }
}

// CSS for hidden
const s = document.createElement('style');
s.textContent = '.hidden{display:none}';
document.head.appendChild(s);

init();
</script>
</body></html>
